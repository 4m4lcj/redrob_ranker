# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  The solution uses a two-stage candidate ranking pipeline. 
  First, rule-based filtering removes candidates with eligibility 
  mismatches and low-quality or inconsistent profiles using metadata 
  and behavioral signals. The remaining candidates are converted 
  into structured text and embedded alongside the parsed job 
  description using a Sentence Transformer model. Cosine similarity 
  is then used to measure semantic relevance, and candidates 
  are ranked in descending order of similarity. This approach
  combines the efficiency and interpretability of rule-based
  filtering with the contextual understanding of embedding-based 
  semantic matching, providing more accurate retrieval than keyword 
  matching while remaining lightweight. Runtime is approximately 
  21.4 seconds on CPU for the evaluation dataset.

